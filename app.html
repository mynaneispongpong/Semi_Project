                            "on-secondary-fixed-variant": "#444749",
                            outline: "#767586",
                            "tertiary-fixed-dim": "#4edea3",
                            "inverse-on-surface": "#eaf1ff",

                            "surface-bright": "#f8f9ff",
                            "secondary-fixed-dim": "#c4c7c9",
                            secondary: "#5c5f61",

                            "inverse-primary": "#c0c1ff",
                            "surface-container-high": "#dce9ff",
                            "on-secondary-fixed": "#191c1e",
                            "tertiary-fixed": "#6ffbbe",
                            "surface-container-lowest": "#ffffff",
                            "on-surface": "#0b1c30",

        <style>
            body {
                font-family: "Inter", sans-serif;
                background-color: #f8f9ff;
            }
            .glass-panel {
                background: rgba(255, 255, 255, 0.8);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(199, 196, 215, 0.2);
            }
            .tinted-shadow {
                box-shadow: 0 4px 24px rgba(70, 72, 212, 0.04);
            }

            /* 스크롤바 디자인 */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: #e0e3e5;
                border-radius: 4px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #c4c7c9;
            }

            /* Placeholder 지원 */
            [contenteditable]:empty:before {
                content: attr(placeholder);
                color: #767586;
                pointer-events: none;
                display: block;
            }

            /* 스낵바 알림 */
            #snackbar {
                position: fixed;
                right: 24px;
                bottom: 24px;
                background: #213145;
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                font-size: 14px;
                box-shadow: 0 8px 24px rgba(11, 28, 48, 0.2);
                transform: translateY(100px);
                opacity: 0;
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 100;
                font-weight: 500;
            }
            #snackbar.show {
                transform: translateY(0);
                opacity: 1;
            }
        </style>

        <div class="flex-1 ml-64 flex flex-col h-screen">

        <div id="snackbar" aria-live="polite"></div>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                // --- DOM 요소 참조 ---
                const noteList = document.getElementById("note-list");
                const newBtns = document.querySelectorAll(".new-note-btn");
                const saveBtn = document.getElementById("save-btn");
                const titleInput = document.getElementById("note-title");
                const contentDiv = document.getElementById("note-content");
                const lastEdited = document.getElementById("last-edited");
                const searchInputEl = document.getElementById("note-search");
                const searchInput = searchInputEl || { value: "" };
                const snackbar = document.getElementById("snackbar");

                // Gemini 관련 DOM
                const geminiPanel = document.getElementById("gemini-panel");
                const toggleGeminiBtn = document.getElementById("toggle-gemini-btn");
                const closeGeminiBtn = document.getElementById("close-gemini-btn");
                const geminiSend = document.getElementById("gemini-send");
                const geminiPrompt = document.getElementById("gemini-prompt");
                const geminiResponse = document.getElementById("gemini-response");
                const geminiClear = document.getElementById("gemini-clear");

                let notesCache = [];
                let selected = null;
                let snackbarTimer;

                // --- 유틸리티 ---
                function showMessage(msg, ms = 2000) {
                    snackbar.textContent = msg;
                    snackbar.classList.add("show");
                    clearTimeout(snackbarTimer);
                    snackbarTimer = setTimeout(() => snackbar.classList.remove("show"), ms);
                }

                function escapeHtml(s) {
                    return String(s || "")
                        .replace(/&/g, "&amp;")
                        .replace(/</g, "&lt;")
                        .replace(/>/g, "&gt;");
                }

                function timeAgo(dateString) {
                    if (!dateString) return "";
                    const date = new Date(dateString);
                    const seconds = Math.floor((new Date() - date) / 1000);
                    if (seconds < 60) return "Just now";
                    const minutes = Math.floor(seconds / 60);
                    if (minutes < 60) return `${minutes} mins ago`;
                    const hours = Math.floor(minutes / 60);
                    if (hours < 24) return `${hours} hours ago`;
                    return date.toLocaleDateString();
                }

                // --- 노트 관리 로직 ---
                async function fetchNotes() {
                    try {
                        noteList.innerHTML = '<div class="p-4 text-center text-secondary">Loading...</div>';
                        const res = await fetch("/api/notes");
                        notesCache = await res.json();
                        renderList();
                    } catch (e) {
                        console.error(e);
                        noteList.innerHTML = '<div class="p-4 text-center text-error">Failed to load notes.</div>';
                    }
                }

                function renderList(filterText = "") {
                    if (!Array.isArray(notesCache) || notesCache.length === 0) {
                        noteList.innerHTML =
                            '<div class="p-6 text-center text-secondary">No notes found. Create a new one!</div>';
                        return;
                    }

                    const filtered = notesCache.filter((n) => {
                        const term = filterText.toLowerCase();
                        return (
                            (n.title || "").toLowerCase().includes(term) ||
                            (n.content || "").toLowerCase().includes(term)
                        );
                    });

                    noteList.innerHTML = filtered
                        .map((n) => {
                            const title = escapeHtml(n.title || "Untitled");
                            // HTML 태그 제거하여 요약 생성
                            const tempDiv = document.createElement("div");
                            tempDiv.innerHTML = n.content || "";
                            const snippetText = tempDiv.textContent || tempDiv.innerText || "";
                            const snippet = escapeHtml(snippetText.slice(0, 80));

                            const time = timeAgo(n.updatedAt);
                            const isActive = selected && String(selected.id) === String(n.id);

                            // 활성 상태에 따른 디자인 차이 적용
                            const activeClasses = isActive
                                ? "border-l-4 border-l-primary bg-white glass-panel tinted-shadow"
                                : "bg-white/40 border-outline-variant/10 hover:bg-white hover:tinted-shadow border-l-4 border-transparent";

                            return `
                    <div class="note-card p-4 rounded-xl cursor-pointer transition-all duration-200 group flex flex-col gap-2 ${activeClasses}" data-id="${n.id}">
                        <div class="flex justify-between items-start">
                            <h4 class="font-label-md text-label-md text-on-surface font-semibold mb-1 truncate">${title}</h4>
                            <button class="delete-btn text-secondary/40 hover:text-error opacity-0 group-hover:opacity-100 transition-opacity" data-id="${n.id}" title="Delete note">
                                <span class="material-symbols-outlined text-[18px]">delete</span>
                            </button>
                        </div>
                        <p class="font-caption text-caption text-secondary line-clamp-2 mb-2 break-all">${snippet}</p>
                        <div class="flex justify-between items-center text-xs text-secondary/70">
                            <span>${time}</span>
                        </div>
                    </div>`;
                        })
                        .join("");
                }

                function selectNote(note) {
                    selected = note;
                    titleInput.value = note.title || "";
                    contentDiv.innerHTML = note.content || "";
                    lastEdited.textContent = note.updatedAt ? "Last edited " + timeAgo(note.updatedAt) : "New Note";
                    renderList(searchInput.value); // 활성 스타일 업데이트
                }

                function resetEditor() {
                    selected = null;
                    titleInput.value = "";
                    contentDiv.innerHTML = "";
                    lastEdited.textContent = "New Note";
                    titleInput.focus();
                    renderList(searchInput.value);
                }

                // --- 이벤트 리스너 ---

                // 노트 선택 및 삭제
                noteList.addEventListener("click", async (e) => {
                    const delBtn = e.target.closest(".delete-btn");
                    if (delBtn) {
                        e.stopPropagation();
                        const id = delBtn.dataset.id;
                        if (!confirm("Are you sure you want to delete this note?")) return;

                        try {
                            await fetch("/api/notes/" + id, { method: "DELETE" });
                            showMessage("Note deleted");
                            if (selected && String(selected.id) === String(id)) resetEditor();
                            await fetchNotes();
                        } catch (err) {
                            showMessage("Failed to delete");
                        }
                        return;
                    }

                    const card = e.target.closest(".note-card");
                    if (card) {
                        const id = card.dataset.id;
                        const note = notesCache.find((x) => String(x.id) === String(id));
                        if (note) selectNote(note);
                    }
                });

                // 새 노트 버튼들 (사이드바, 헤더)
                newBtns.forEach((btn) => btn.addEventListener("click", resetEditor));

                // 저장 기능
                saveBtn.addEventListener("click", async () => {
                    const originalText = saveBtn.innerText;
                    saveBtn.innerText = "Saving...";
                    saveBtn.disabled = true;

                    try {
                        const payload = { title: titleInput.value, content: contentDiv.innerHTML }; // Rich text 보존을 위해 innerHTML 사용
                        const url = selected ? "/api/notes/" + selected.id : "/api/notes";
                        const method = selected ? "PUT" : "POST";

                        const res = await fetch(url, {
                            method,
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload),
                        });

                        const savedData = await res.json();
                        showMessage("Saved successfully");
                        await fetchNotes();

                        const updatedNote = notesCache.find((x) => String(x.id) === String(savedData.id));
                        if (updatedNote) selectNote(updatedNote);
                    } catch (e) {
                        showMessage("Failed to save");
                    } finally {
                        saveBtn.innerText = originalText;
                        saveBtn.disabled = false;
                    }
                });

                // 검색 필터 (검색 입력이 없는 경우 이벤트 등록을 건너뜀)
                if (searchInputEl) {
                    searchInputEl.addEventListener("input", (e) => renderList(e.target.value));
                }

                // --- Gemini AI 로직 ---
                toggleGeminiBtn.addEventListener("click", () => {
                    geminiPanel.classList.toggle("hidden");
                });

                closeGeminiBtn.addEventListener("click", () => {
                    geminiPanel.classList.add("hidden");
                });

                // 서버 통신 함수 분리
                async function sendGeminiRequest() {
                    console.log("버튼이 클릭되었습니다!");

                    const prompt = geminiPrompt.value.trim();

                    if (!prompt) {
                        alert("제미나이 입력창이 비어있습니다! 글을 써주세요.");
                        return;
                    }

                    // 로딩 상태 표시
                    geminiResponse.innerHTML = `<div class="text-primary animate-pulse">AI is thinking...</div>`;
                    geminiSend.disabled = true;

                    try {
                        console.log("서버로 발송하려는 내용:", prompt);
                        console.log("서버로 요청을 보냅니다:", { prompt });

                        const res = await fetch("/api/gemini", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ prompt }),
                        });

                        const data = await res.json();
                        console.log("서버 응답 결과:", data);

                        if (!res.ok || data.error) {
                            // 여기가 수정된 에러 처리 부분입니다
                            const errorMsg = data.detail
                                ? `${data.error}: ${data.detail}`
                                : data.error || "알 수 없는 에러";
                            throw new Error(errorMsg);
                        }

                        // 백엔드에서 텍스트만 추출해준 data.data를 사용
                        geminiResponse.innerHTML = `
                        <div class="bg-surface-container-low p-4 rounded-xl border border-outline-variant/20 shadow-sm text-on-surface text-left">
                            ${escapeHtml(typeof data.data === "string" ? data.data : JSON.stringify(data.data))}
                        </div>
                    `;
                        geminiPrompt.value = "";
                    } catch (err) {
                        console.error("Gemini API 에러:", err);
                        geminiResponse.innerHTML = `<div class="text-error font-medium">요청 실패: ${err.message}</div>`;
                    } finally {
                        geminiSend.disabled = false;
                        geminiPrompt.focus();
                    }
                }

                // 버튼 클릭 이벤트
                geminiSend.addEventListener("click", sendGeminiRequest);

                // 엔터 키 이벤트 (Shift+Enter는 줄바꿈, 그냥 Enter는 전송)
                geminiPrompt.addEventListener("keydown", (e) => {
                    if (e.key === "Enter" && !e.shiftKey) {
                        e.preventDefault();
                        sendGeminiRequest();
                    }
                });

                geminiClear.addEventListener("click", () => {
                    geminiPrompt.value = "";
                    geminiResponse.innerHTML = `<div class="w-full text-secondary text-sm text-left my-auto whitespace-normal">글을 더 잘 쓰는 데 도움이 되는 것은 무엇이든 물어보세요!</div>`;
                    geminiPrompt.focus();
                });

                // 단축키 지원 (Cmd/Ctrl + S)
                document.addEventListener("keydown", (e) => {
                    if ((e.ctrlKey || e.metaKey) && e.key === "s") {
                        e.preventDefault();
                        saveBtn.click();
                    }
                });

                // 초기 데이터 로딩
                fetchNotes();
            });
        </script>
    </body>
</html>
